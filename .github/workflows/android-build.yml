name: Android Build CI

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android Debug and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Keystore (Optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.MEMEAI_KEYSTORE_BASE64 }}
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/memeai-release-key.keystore

      - name: Configure Gradle properties for signing (Optional)
        env:
          KEYSTORE_BASE64: ${{ secrets.MEMEAI_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.MEMEAI_UPLOAD_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MEMEAI_UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.MEMEAI_UPLOAD_KEY_PASSWORD }}
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          echo "MEMEAI_UPLOAD_STORE_FILE=memeai-release-key.keystore" >> android/gradle.properties
          echo "MEMEAI_UPLOAD_KEY_ALIAS=$KEY_ALIAS" >> android/gradle.properties
          echo "MEMEAI_UPLOAD_STORE_PASSWORD=$STORE_PASSWORD" >> android/gradle.properties
          echo "MEMEAI_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD" >> android/gradle.properties

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
